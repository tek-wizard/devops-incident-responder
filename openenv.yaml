name: "devops-incident-responder"
version: "1.0.0"
description: "A real-world SRE simulator where agents diagnose and fix server outages."
entry_point: "server.app:app"
tags: ["devops", "sre", "troubleshooting", "real-world"]

schema:
  action: "server.models:IncidentAction"
  observation: "server.models:SystemObservation"
  state: "server.models:SystemState"

tasks:
  - id: "service_restart"
    difficulty: "easy"
    description: "A critical API service has crashed and needs a restart."
  - id: "memory_leak"
    difficulty: "medium"
    description: "Kill a leaking worker process and then restart auth-api to restore service."
  - id: "db_connection_exhaustion"
    difficulty: "hard"
    description: "Scale the degraded database first, then clear stale connections to recover latency."